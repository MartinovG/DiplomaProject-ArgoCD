apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gm-diploma-project-external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/finalizer
spec:
  project: default
  source:
    repoURL: "https://charts.external-secrets.io"
    chart: external-secrets
    targetRevision: "0.10.5"
    helm:
      values: |
        serviceAccount:
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::787587782604:role/gm-diploma-external-secrets-role"
        webhook:
          certManager:
            enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
