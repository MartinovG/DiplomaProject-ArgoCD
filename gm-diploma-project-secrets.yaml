apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gm-diploma-project-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io/finalizer
spec:
  project: default
  source:
    repoURL: 'https://github.com/MartinovG/DiplomaProject-ArgoCD.git'
    targetRevision: main
    path: eu-central-1/prod/secrets
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
